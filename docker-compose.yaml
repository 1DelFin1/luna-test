services:
  server:
    build:
      dockerfile: ./Dockerfile
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - backend_network


  db:
    image: "postgres:17"
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_DB__USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_DB__PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB__DATABASE}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_DB__USERNAME} -d ${POSTGRES_DB__DATABASE}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_network

volumes:
  pgdata:

networks:
  backend_network:
    driver: bridge
